<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}SYNAPTO Admin{% endblock %}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#080c14;color:#e0e0e0;min-height:100vh;display:flex}
.sidebar{width:240px;background:#0d1117;border-right:1px solid #1e2a3a;padding:1.5rem 0;flex-shrink:0;display:flex;flex-direction:column}
.sidebar .brand{padding:0 1.5rem 1.5rem;font-size:1.3rem;font-weight:900;color:#00d4ff;letter-spacing:1px;border-bottom:1px solid #1e2a3a;margin-bottom:1rem}
.sidebar a{display:flex;align-items:center;gap:.75rem;padding:.75rem 1.5rem;color:#8b949e;text-decoration:none;font-weight:600;font-size:.95rem;transition:.2s}
.sidebar a:hover,.sidebar a.active{color:#00d4ff;background:rgba(0,212,255,.06)}
.sidebar a.active{border-right:3px solid #00d4ff}
.main{flex:1;padding:2rem;overflow-y:auto}
h1{font-size:1.5rem;margin-bottom:1.5rem;color:#f0f0f0}
h2{font-size:1.15rem;margin-bottom:1rem;color:#c0c0c0}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;padding:1.25rem}
.stat-card .num{font-size:2rem;font-weight:900;color:#00d4ff}
.stat-card .label{color:#8b949e;font-size:.85rem;margin-top:.25rem}
table{width:100%;border-collapse:collapse;background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;overflow:hidden}
th,td{padding:.85rem 1rem;text-align:left;border-bottom:1px solid #1e2a3a;font-size:.9rem}
th{background:#161b22;color:#8b949e;font-weight:700;text-transform:uppercase;font-size:.75rem;letter-spacing:.5px}
tr:hover{background:rgba(0,212,255,.03)}
.badge{display:inline-block;padding:.25rem .65rem;border-radius:999px;font-size:.75rem;font-weight:700}
.badge-pending{background:rgba(234,179,8,.12);color:#eab308;border:1px solid rgba(234,179,8,.3)}
.badge-approved{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.badge-rejected{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.badge-active{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.badge-deactivated{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.btn{display:inline-block;padding:.55rem 1.1rem;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;border:none;transition:.2s;text-decoration:none}
.btn-green{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.btn-green:hover{background:rgba(34,197,94,.25)}
.btn-red{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.btn-red:hover{background:rgba(239,68,68,.25)}
.btn-blue{background:rgba(0,212,255,.12);color:#00d4ff;border:1px solid rgba(0,212,255,.3)}
.btn-blue:hover{background:rgba(0,212,255,.22)}
.btn-sm{padding:.4rem .8rem;font-size:.8rem}
.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:.85rem;color:#8b949e;margin-bottom:.4rem;font-weight:600}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:.7rem 1rem;background:#080c14;border:1px solid #1e2a3a;color:#e0e0e0;border-radius:8px;font-size:.95rem;outline:none;transition:.2s;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{border-color:#00d4ff;box-shadow:0 0 12px rgba(0,212,255,.15)}
.form-group textarea{resize:vertical;min-height:70px}
.card{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.actions-cell{display:flex;gap:.5rem;flex-wrap:wrap}
.empty{text-align:center;padding:3rem;color:#8b949e}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
.login-box{background:#0d1117;border:1px solid #1e2a3a;border-radius:16px;padding:2.5rem;width:380px}
.login-box h1{text-align:center;margin-bottom:1.5rem}
.login-box .error-msg{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#ef4444;padding:.7rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;text-align:center}
.toast{position:fixed;top:1.5rem;right:1.5rem;background:#0d1117;border:1px solid #22c55e;color:#22c55e;padding:.85rem 1.25rem;border-radius:10px;font-weight:700;z-index:9999;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.sidebar{width:60px}.sidebar .brand,.sidebar a span{display:none}.sidebar a{justify-content:center;padding:.75rem}th,td{padding:.6rem;font-size:.8rem}.stats{grid-template-columns:1fr}}
</style>
{% block head %}{% endblock %}
</head>
<body>
{% if show_sidebar != False %}
<aside class="sidebar">
  <div class="brand">SYNAPTO</div>
  <a href="/admin" class="{% if active_page == 'dashboard' %}active{% endif %}"><span>📊</span><span>Dashboard</span></a>
  <a href="/admin/requests" class="{% if active_page == 'requests' %}active{% endif %}"><span>📥</span><span>Requests</span></a>
  <a href="/admin/licenses" class="{% if active_page == 'licenses' %}active{% endif %}"><span>🔑</span><span>Licenses</span></a>
  <a href="/admin/add-license" class="{% if active_page == 'add' %}active{% endif %}"><span>➕</span><span>Add License</span></a>
  <a href="/admin/logout" style="margin-top:auto;border-top:1px solid #1e2a3a;padding-top:1rem"><span>🚪</span><span>Logout</span></a>
</aside>
{% endif %}
<main class="main">
  {% block content %}{% endblock %}
</main>
{% if toast %}<div class="toast">{{ toast }}</div>{% endif %}
</body>
</html>
