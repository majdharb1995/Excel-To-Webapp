{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% set show_sidebar = False %}
{% block content %}
<div class="login-wrap">
  <div class="login-box">
    <h1>🔒 Admin Login</h1>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter admin password" autofocus required>
      </div>
      <button type="submit" class="btn btn-blue" style="width:100%;padding:.8rem;font-size:1rem">Login</button>
    </form>
  </div>
</div>
{% endblock %}
