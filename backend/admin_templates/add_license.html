{% extends "base.html" %}
{% block title %}Add License{% endblock %}
{% block content %}
<h1>➕ Add License Manually</h1>
<div class="card" style="max-width:500px">
  <form method="POST" action="/admin/licenses/add">
    <div class="form-group">
      <label>Email *</label>
      <input type="email" name="email" required placeholder="user@example.com">
    </div>
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" name="full_name" required placeholder="John Doe">
    </div>
    <div class="form-group">
      <label>Company</label>
      <input type="text" name="company" placeholder="Company name">
    </div>
    <div class="form-group">
      <label>Valid Days</label>
      <input type="number" name="days" value="30" min="1" max="365">
    </div>
    <button type="submit" class="btn btn-green">Create License</button>
  </form>
</div>
{% endblock %}
